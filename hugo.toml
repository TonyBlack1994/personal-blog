baseURL = "https://luxseen.com/"
languageCode = "zh-cn"
title = "Luxseen"
theme = "PaperMod"

enableRobotsTXT = true

[taxonomies]

category = "categories"
tag = "tags"
subcategory = "subcategories"

[pagination]
pagerSize = 10


[outputs]
home = ["HTML", "RSS", "JSON"]


[params]
author = "Tony"

description = "Luxseen 是一个记录独立站运营、DTC、Shopify、数据分析、AI工具、阅读与个人思考的个人博客。"

defaultTheme = "auto"

ShowReadingTime = true
ShowShareButtons = true
ShowPostNavLinks = true
ShowBreadCrumbs = true
ShowCodeCopyButtons = true
ShowToc = true


[params.homeInfoParams]

Title = "你好，欢迎来到 Luxseen 👋"

Content = """
这里记录关于独立站运营、DTC、Shopify、数据分析、AI工具，以及阅读与个人思考。

把实践变成经验，把经验沉淀成方法。
"""


